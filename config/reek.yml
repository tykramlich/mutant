---
detectors:
  Attribute:
    enabled: false
    exclude: []
  BooleanParameter:
    enabled: true
    exclude: []
  ClassVariable:
    enabled: true
    exclude: []
  ControlParameter:
    enabled: true
    exclude:
    - Mutant::Expression#match_length
  DataClump:
    enabled: true
    exclude:
    - Mutant::Config::Loader::NodeReader
    - Mutant::Matcher::SourcePath
    max_copies: 2
    min_clump_size: 2
  DuplicateMethodCall:
    enabled: false
    exclude:
    - Mutant::CLI::Options#add_debug_options
    - Mutant::CLI::Session#load_session
    - Mutant::CLI::Subcommands#handle_environment
    max_calls: 1
    allow_calls: []
  ManualDispatch:
    enabled: false
    exclude: []
  FeatureEnvy:
    enabled: false
    exclude: []
  IrresponsibleModule:
    enabled: false
    exclude: []
  LongParameterList:
    enabled: true
    exclude:
    - Mutant::Matcher::Method::Instance#self.build
    - Mutant::Matcher::SourcePath#subject_methods
    - Mutant::Meta::Example::DSL # 3 vars
    - Mutant::Config::Loader::NodeReader#fail_invalid_scalar
    - Mutant::Config::Loader::NodeReader#fail_invalid_type
    - Mutant::Config::Loader::NodeReader#fail_unknown_key
    - Mutant::Config::Loader::NodeReader#mapping
    - Mutant::Config::Loader::NodeReader#scalar
    max_params: 2
  LongYieldList:
    enabled: true
    exclude: []
    max_params: 2
  NestedIterators:
    enabled: true
    exclude:
    - Mutant#self.singleton_subclass_instance
    - Mutant::CLI#parse
    - Mutant::CLI::Help#print_run_help
    - Mutant::Mutator::Node::Arguments#emit_argument_mutations
    - Mutant::Mutator::Node::Resbody#mutate_captures
    - Mutant::Mutator::Util::Array::Element#dispatch
    - Mutant::Parallel::Master#run
    - Mutant::RequireHighjack#self.call
    - Mutant::Selector::Expression#call
    - Parser::Lexer#self.new
    max_allowed_nesting: 1
  NilCheck:
    enabled: false
  RepeatedConditional:
    enabled: true
    exclude:
    - Mutant::Mutator
    - Mutant::Meta::Example::DSL
    - Mutant::Config::Loader::NodeReader
    - Mutant::Repository::Diff
    - Mutant::SinceRevisionResolver
    max_ifs: 1
  TooManyInstanceVariables:
    enabled: true
    exclude:
    - Mutant::Mutator # 4 vars
    - Mutant::Parallel::Master # 4 vars
    - Mutant::Meta::Example::DSL # 4 vars
    - Mutant::Result::Mutation # 4 vars
    max_instance_variables: 3
  TooManyMethods:
    enabled: true
    exclude:
    - Mutant::CLI
    - Mutant::Mutator::Node
    - Mutant::Parallel::Master
    - Mutant::Config::Loader
    - Mutant::Config::Loader::NodeReader
    max_methods: 10
  TooManyStatements:
    enabled: true
    exclude:
    - Mutant::CLI#add_debug_options
    - Mutant::CLI#add_environment_options
    - Mutant::CLI::Options#add_filter_options
    - Mutant::CLI#config_file_sets_jobs?
    - Mutant::CLI#normalize_arguments
    - Mutant::CLI#parse
    - Mutant::CLI::Options#add_debug_options
    - Mutant::CLI::Options#add_environment_options
    - Mutant::CLI::Session#load_session
    - Mutant::CLI::Session#print_session_list
    - Mutant::CLI::Session#print_session_show
    - Mutant::CLI::Subcommands#handle_help
    - Mutant::CLI::Subcommands#print_environment
    - Mutant::Reporter::CLI::Printer::Config#run
    - Mutant::Reporter::CLI::Printer::EnvProgress#run
    - Mutant::Runner#run_driver
    - Mutant::Zombifier::File#self.find
    - Mutant::Env#with_environment_variables
    max_statements: 7
  UncommunicativeMethodName:
    enabled: true
    exclude:
    - Mutant::AST::Sexp#s
    - Mutant::Mutation#sha1
    reject:
    - '/^[a-z]$/'
    - '/[0-9]$/'
    - '/[A-Z]/'
    accept: []
  UncommunicativeModuleName:
    enabled: true
    exclude: []
    reject:
    - '/^.$/'
    - '/[0-9]$/'
    accept: []
  UncommunicativeParameterName:
    enabled: true
    exclude: []
    reject:
    - '/^.$/'
    - '/[0-9]$/'
    - '/[A-Z]/'
    accept: []
  UncommunicativeVariableName:
    enabled: true
    exclude: []
    reject:
    - '/^.$/'
    - '/[0-9]$/'
    - '/[A-Z]/'
    accept: ['force_utf32']
  UnusedParameters:
    enabled: true
    exclude: []
  UtilityFunction:
    enabled: true
    exclude:
    - Mutant::AST::Sexp#s
    - Mutant::CLI#puts
    - Mutant::CLI#reporter
    - Mutant::CLI#warn_deprecation
    - Mutant::CLI::Session#session_value
    - Mutant::Config::Loader#attribute_name # intentional, private helper
    - Mutant::Integration::Null#call
    - Mutant::Integration::Rspec#parse_example
    - Mutant::Integration::Rspec#parse_expression # intentional, private
    - Mutant::Matcher::SourcePath#candidate_method_names # intentional
    - Mutant::Meta::Example::Verification#format_mutations # intentional, private
    - Mutant::Reporter::CLI::Format::Progressive#new_buffer
    - Mutant::Reporter::CLI::Printer::StatusProgressive#object # False positive calls super
    - Mutant::Repository::Diff#tracks? # intentional, private
    - Mutant::Repository::Diff#within_working_directory? # intentional, private
    - Mutant::Config::CoverageCriteria#timeout_status? # intentional, private
    - Mutant::Config::Loader::NodeReader#to_ruby # intentional, private
    - Mutant::CLI#config_file_sets_jobs? # intentional, private helper for config
    - Mutant::Result::Mutation#coverage_criteria # intentional, private helper for thread-local config
    - Mutant::Result::Env::IO#format_error # intentional, private helper
    - Mutant::Result::Env::IO#serialize_alive # intentional, private helper
