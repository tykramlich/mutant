version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7

  - package-ecosystem: bundler
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

# NOTE: /test_app contains only non-standard Gemfiles (Gemfile.minitest,
# Gemfile.rspec3.13, Gemfile.rspec3.7, Gemfile.rspec3.8). Dependabot's bundler
# ecosystem only discovers standard Gemfile/gems.rb filenames, so no update
# PRs would be generated for this directory until a standard Gemfile exists.
# Consider adding a Gemfile that requires the variant Gemfiles if desired.
